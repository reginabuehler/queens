name: Update Pixi lockfile

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 5 1 * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-pixi-lock:
    name: Update Pixi lockfile
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Pixi
        uses: ./.github/actions/setup-queens-pixi
        with:
          run-install: false
          install-editable: false
          ensure-rsync: false
      - name: Update Pixi lockfile
        run: |
          pixi update --json | pixi exec pixi-diff-to-markdown > pixi_lock_update.md
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Update Pixi lockfile
          title: Update Pixi lockfile
          body-path: pixi_lock_update.md
          branch: update-pixi-lock
          base: main
          labels: pixi
          delete-branch: true
          add-paths: pixi.lock
