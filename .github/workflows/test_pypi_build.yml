# yamllint disable
name: Test PyPI build

on:
  schedule:
    - cron: "0 1 * * *"
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test_pypi_build:
    name: PyPI build test (${{ matrix.os }}, ${{ matrix.install_target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            install_target: base
            extra_selector: ""
          - os: ubuntu-latest
            install_target: all
            extra_selector: "[all]"
          - os: macos-latest
            install_target: base
            extra_selector: ""
          - os: macos-latest
            install_target: all
            extra_selector: "[all]"
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and sdist
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip build
          python -m build
      - name: Install built wheel in clean virtual environment
        run: |
          set -euo pipefail

          python -m venv .venv-pypi-smoke
          source .venv-pypi-smoke/bin/activate
          python -m pip install --upgrade pip
          wheel_path="$(find dist -maxdepth 1 -type f -name '*.whl' | head -n 1)"
          python -m pip install "${wheel_path}${{ matrix.extra_selector }}"
      - name: Run pure PyPI smoke checks
        run: |
          set -euo pipefail

          source .venv-pypi-smoke/bin/activate
          python -c "import queens"
          pytest -v -m "unit_tests" --ignore=tests/unit_tests/utils/test_path_utils.py tests/unit_tests/
