name: Test PyPI build

"on":
  schedule:
    - cron: "0 1 * * *"
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test_pypi_build:
    name: >-
      PyPI build test
      (${{ matrix.os }}, ${{ matrix.install_target }}, ${{ matrix.requiredness }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            install_target: base
            extra_selector: ""
            allow_failure: false
            requiredness: required
          - os: ubuntu-latest
            install_target: all
            extra_selector: "[all]"
            allow_failure: false
            requiredness: required
          - os: macos-latest
            install_target: base
            extra_selector: ""
            allow_failure: true
            requiredness: optional
          - os: macos-latest
            install_target: all
            extra_selector: "[all]"
            allow_failure: true
            requiredness: optional
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install built wheel in clean virtual environment
        run: |
          python -m venv .venv-pypi-smoke
          source .venv-pypi-smoke/bin/activate
          python -m pip install --upgrade pip
          wheel_path="$(find dist -maxdepth 1 -type f -name '*.whl' | head -n 1)"
          python -m pip install "${wheel_path}${{ matrix.extra_selector }}"
          python -m pip install pytest pytest-mock mock
      - name: Run pure PyPI smoke checks
        run: |
          source .venv-pypi-smoke/bin/activate
          python -c "import queens"
          pytest -v -m "unit_tests" tests/unit_tests/
