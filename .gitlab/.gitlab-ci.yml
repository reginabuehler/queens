# yamllint disable
---
#---------------------------------------------------------------------------------------------------
variables:
  GIT_STRATEGY: clone
  GIT_CHECKOUT: "true"
  GIT_CLEAN_FLAGS: -ffdx
  LNM_TESTS:
    value: "1"
    description: "Run cluster tests at LNM"
  IMCS_TESTS:
    value: "1"
    description: "Run cluster tests at IMCS"
  BUILD_4C:
    value: "1"
    description: "Build 4C in CI. Set to 0 to check for an existing remote 4C executable"
  REMOTE_BUILD_DIR:
    value: "/home/queens/builds/queens-$CI_PIPELINE_ID"
  LNM_REMOTE_PYTHON:
    value: "$REMOTE_BUILD_DIR/.pixi/envs/dev/bin/python"
    description: "Python path on LNM clusters"
  LNM_REMOTE_ADDRESS:
    value: "thought"
    description: "Hostname of LNM cluster"
  IMCS_REMOTE_PYTHON:
    value: "$REMOTE_BUILD_DIR/.pixi/envs/dev/bin/python"
    description: "Python path on IMCS clusters"
  IMCS_REMOTE_ADDRESS:
    value: "charon.bauv.unibw-muenchen.de"
    description: "Hostname of IMCS cluster"
  PIXI_ENVIRONMENT:
    value: "dev"
    description: "Pixi workspace environment used in CI jobs"
#---------------------------------------------------------------------------------------------------
# Define stages
#---------------------------------------------------------------------------------------------------
stages:
  - build
  - tests
  - cleanup
#---------------------------------------------------------------------------------------------------
# Define general workflow
#---------------------------------------------------------------------------------------------------
# in order to run at all any pipeline has to fulfill one of the  following conditions
workflow:
  rules:
    # if manually triggered with the web interface's "run pipeline"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"
#---------------------------------------------------------------------------------------------------
# Define platform specific settings
#---------------------------------------------------------------------------------------------------
.check_pixi_available:
  before_script:
    - |
      export PIXI_VERSION="$(tr -d '[:space:]' < .pixi-version)"
      export PIXI_HOME="$HOME/.pixi"
      export PATH="$PIXI_HOME/bin:$PATH"

      pixi_version_matches() {
        hash -r 2>/dev/null || true
        if ! command -v pixi >/dev/null 2>&1; then
          return 1
        fi
        installed_pixi_version="$(pixi --version 2>/dev/null | awk '{print $2}')"
        [ "${installed_pixi_version#v}" = "${PIXI_VERSION#v}" ]
      }

      install_or_update_pixi() {
        if command -v pixi >/dev/null 2>&1; then
          echo "Updating pixi to $PIXI_VERSION..."
          if pixi self-update --version "${PIXI_VERSION#v}" --force --no-release-note; then
            hash -r 2>/dev/null || true
            return
          fi
          echo "pixi self-update failed; installing pixi $PIXI_VERSION into $PIXI_HOME..."
        else
          echo "Installing pixi $PIXI_VERSION into $PIXI_HOME..."
        fi
        curl -fsSL https://pixi.sh/install.sh | PIXI_VERSION="$PIXI_VERSION" PIXI_HOME="$PIXI_HOME" bash
        hash -r 2>/dev/null || true
      }

      if ! pixi_version_matches; then
        mkdir -p "$PIXI_HOME"
        PIXI_INSTALL_LOCK="$PIXI_HOME/.install.lock"
        pixi_install_lock_acquired=0
        while [ "$pixi_install_lock_acquired" -eq 0 ] && ! pixi_version_matches; do
          if mkdir "$PIXI_INSTALL_LOCK" 2>/dev/null; then
            pixi_install_lock_acquired=1
          else
            echo "Waiting for another pixi installation or update to finish..."
            sleep 5
          fi
        done
        if [ "$pixi_install_lock_acquired" -eq 1 ]; then
          trap 'rmdir "$PIXI_INSTALL_LOCK"' EXIT
          if ! pixi_version_matches; then
            install_or_update_pixi
          fi
          rmdir "$PIXI_INSTALL_LOCK"
          trap - EXIT
        fi
      fi
      pixi --version
      if ! pixi_version_matches; then
        echo "Installed pixi version does not match pinned version $PIXI_VERSION." >&2
        exit 1
      fi
#---------------------------------------------------------------------------------------------------
# Jobs of stage: build
#---------------------------------------------------------------------------------------------------
.build_pixi_env:
  extends:
    - .check_pixi_available
  stage: build
  script:
    - pixi install --locked -e "$PIXI_ENVIRONMENT"
    - pixi run --locked -e "$PIXI_ENVIRONMENT" install-editable
    - pixi list --locked -e "$PIXI_ENVIRONMENT" > pipeline_pixi_environment.txt
  artifacts:
    name: "pixi_env-$CI_PIPELINE_ID.txt"
    paths:
      - pipeline_pixi_environment.txt
    when: always
    expire_in: 4 weeks

lnm-build_pixi_env:
  extends:
    - .build_pixi_env
  tags:
    - lnm-build
  rules:
    - if: $LNM_TESTS == "1"

imcs-build_pixi_env:
  extends:
    - .build_pixi_env
  tags:
    - imcs-build
  rules:
    - if: $IMCS_TESTS == "1"
#----------------------------------------------------------------------------------------------
.build_pixi_env_cluster:
  extends:
    - .check_pixi_available
  stage: build
  script:
    - export PIXI_VERSION="$(tr -d '[:space:]' < .pixi-version)"
    - |
      ssh "queens@$REMOTE_ADDRESS" "bash -s -- '$PIXI_VERSION'" <<'REMOTE_PIXI_INSTALL'
      PIXI_VERSION="$1"
      export PIXI_HOME="$HOME/.pixi"
      export PATH="$PIXI_HOME/bin:$PATH"

      pixi_version_matches() {
        hash -r 2>/dev/null || true
        if ! command -v pixi >/dev/null 2>&1; then
          return 1
        fi
        installed_pixi_version="$(pixi --version 2>/dev/null | awk '{print $2}')"
        [ "${installed_pixi_version#v}" = "${PIXI_VERSION#v}" ]
      }

      install_or_update_pixi() {
        if command -v pixi >/dev/null 2>&1; then
          echo "Updating remote pixi to $PIXI_VERSION..."
          if pixi self-update --version "${PIXI_VERSION#v}" --force --no-release-note; then
            hash -r 2>/dev/null || true
            return
          fi
          echo "Remote pixi self-update failed; installing pixi $PIXI_VERSION into $PIXI_HOME..."
        else
          echo "Installing remote pixi $PIXI_VERSION into $PIXI_HOME..."
        fi
        curl -fsSL https://pixi.sh/install.sh | PIXI_VERSION="$PIXI_VERSION" PIXI_HOME="$PIXI_HOME" bash
        hash -r 2>/dev/null || true
      }

      if ! pixi_version_matches; then
        mkdir -p "$PIXI_HOME"
        PIXI_INSTALL_LOCK="$PIXI_HOME/.install.lock"
        pixi_install_lock_acquired=0
        while [ "$pixi_install_lock_acquired" -eq 0 ] && ! pixi_version_matches; do
          if mkdir "$PIXI_INSTALL_LOCK" 2>/dev/null; then
            pixi_install_lock_acquired=1
          else
            echo "Waiting for another remote pixi installation or update to finish..."
            sleep 5
          fi
        done
        if [ "$pixi_install_lock_acquired" -eq 1 ]; then
          trap 'rmdir "$PIXI_INSTALL_LOCK"' EXIT
          if ! pixi_version_matches; then
            install_or_update_pixi
          fi
          rmdir "$PIXI_INSTALL_LOCK"
          trap - EXIT
        fi
      fi
      pixi --version
      if ! pixi_version_matches; then
        echo "Installed remote pixi version does not match pinned version $PIXI_VERSION." >&2
        exit 1
      fi
      REMOTE_PIXI_INSTALL
    - pixi run --locked -e "$PIXI_ENVIRONMENT" install-editable
    - pixi run --locked -e "$PIXI_ENVIRONMENT" python src/queens/utils/remote_build.py
      --host=$REMOTE_ADDRESS --user=queens
      --remote-queens-repository=$REMOTE_BUILD_DIR
      --pixi-environment=$PIXI_ENVIRONMENT

thought-build_pixi_env:
  extends:
    - .build_pixi_env_cluster
  variables:
    REMOTE_ADDRESS: $LNM_REMOTE_ADDRESS
    REMOTE_PYTHON: $LNM_REMOTE_PYTHON
  tags:
    - lnm-build
  rules:
    - if: $LNM_TESTS == "1"

charon-build_pixi_env:
  extends:
    - .build_pixi_env_cluster
  variables:
    REMOTE_ADDRESS: $IMCS_REMOTE_ADDRESS
    REMOTE_PYTHON: $IMCS_REMOTE_PYTHON
  tags:
    - imcs-build
  rules:
    - if: $IMCS_TESTS == "1"

#----------------------------------------------------------------------------------------------
.build_4C:
  stage: build
  script:
    - |
      COMMAND="bash -lc 'srun \
        --job-name="queens_ci_build_4c_$CI_PIPELINE_ID" \
        --nodes=1 \
        --ntasks-per-node=1 \
        --cpus-per-task=$SLURM_CPUS \
        --time=$SLURM_TIME \
        $SLURM_EXTRA_ARGUMENTS \
        bash -c \" \
          $LOAD_MODULES \
          module list ; \
          cd ~/workspace ; \
          rm -rf fourc_source fourc_build ; \
          echo Removed folders fourc_source and fourc_build ; \
          git clone --depth 1 https://github.com/4C-multiphysics/4C.git fourc_source ; \
          mkdir fourc_build ; \
          cd fourc_build ; \
          cmake --preset=$PRESET_4C ../fourc_source ; \
          ninja -j $SLURM_CPUS full \"'"
    - echo $COMMAND
    - ssh queens@$REMOTE_ADDRESS $COMMAND

thought-build_4C:
  extends:
    - .build_4C
  variables:
    LOAD_MODULES: ""
    REMOTE_ADDRESS: $LNM_REMOTE_ADDRESS
    PRESET_4C: "lnm_thought"
    SLURM_CPUS: "16"
    SLURM_TIME: "01:00:00"
  tags:
    - lnm-build
  rules:
    - if: '$LNM_TESTS == "1" && $BUILD_4C == "1"'

charon-build_4C:
  extends:
    - .build_4C
  variables:
    LOAD_MODULES: "source /home/cluster_tools/user/load_four_c_environment.sh;"
    REMOTE_ADDRESS: $IMCS_REMOTE_ADDRESS
    PRESET_4C: "imcs_charon"
    SLURM_EXTRA_ARGUMENTS: "--partition='all'"
    SLURM_CPUS: "24"
    SLURM_TIME: "00:30:00"
  tags:
    - imcs-build
  rules:
    - if: '$IMCS_TESTS == "1" && $BUILD_4C == "1"'

.check_4C:
  stage: build
  script:
    - |
      ssh "queens@$REMOTE_ADDRESS" \
        "bash -lc 'if test -f ~/workspace/fourc_build/4C; then \
          ls -l ~/workspace/fourc_build/4C; \
        else \
          echo Missing required 4C executable: ~/workspace/fourc_build/4C >&2; \
          echo Set BUILD_4C to 1 to build it automatically. >&2; \
          exit 1; \
        fi'"

thought-check_4C:
  extends:
    - .check_4C
  variables:
    REMOTE_ADDRESS: $LNM_REMOTE_ADDRESS
  tags:
    - lnm-build
  rules:
    - if: '$LNM_TESTS == "1" && $BUILD_4C == "0"'

charon-check_4C:
  extends:
    - .check_4C
  variables:
    REMOTE_ADDRESS: $IMCS_REMOTE_ADDRESS
  tags:
    - imcs-build
  rules:
    - if: '$IMCS_TESTS == "1" && $BUILD_4C == "0"'

#---------------------------------------------------------------------------------------------------
# Cluster tests
#---------------------------------------------------------------------------------------------------
.cluster_tests:
  extends:
    - .check_pixi_available
  stage: tests
  script:
    - pixi run --locked -e "$PIXI_ENVIRONMENT" install-editable
    - pixi run --locked -e "$PIXI_ENVIRONMENT" pytest tests/integration_tests/cluster/
      -v -m $CLUSTER_MARKER --no-cov -o log_cli=true --log-cli-level=DEBUG
      --remote-user=queens
      --remote-python=$REMOTE_PYTHON
      --remote-queens-repository=$REMOTE_BUILD_DIR
      --color=yes
      --pipeline-id=$CI_PIPELINE_ID
      --junitxml=test_junit.xml
  artifacts:
    name: $CI_PIPELINE_ID-cluster_test_suite
    paths:
      - test_junit.xml
    reports:
      junit: test_junit.xml
    when: on_success
    expire_in: 3 days

lnm-cluster_tests:
  extends:
    - .cluster_tests
  variables:
    CLUSTER_MARKER: "lnm_cluster"
    REMOTE_PYTHON: $LNM_REMOTE_PYTHON
  needs:
    - job: lnm-build_pixi_env
    - job: thought-build_pixi_env
    - job: thought-build_4C
      optional: true
    - job: thought-check_4C
      optional: true
  tags:
    - lnm-ubuntu
  rules:
    - if: $LNM_TESTS == "1"

imcs-cluster_tests:
  extends:
    - .cluster_tests
  variables:
    CLUSTER_MARKER: "imcs_cluster"
    REMOTE_PYTHON: $IMCS_REMOTE_PYTHON
  needs:
    - job: imcs-build_pixi_env
    - job: charon-build_pixi_env
    - job: charon-build_4C
      optional: true
    - job: charon-check_4C
      optional: true
  tags:
    - imcs-ubuntu
  rules:
    - if: $IMCS_TESTS == "1"

#---------------------------------------------------------------------------------------------------
# Jobs of stage: cleanup
#---------------------------------------------------------------------------------------------------
# Remove pixi environment and repository on cluster
.remove_build_dir_cluster:
  stage: cleanup
  script:
    - ssh queens@$REMOTE_ADDRESS "rm -rf $REMOTE_BUILD_DIR;"
  when: always

thought-cluster-remove_build_dir:
  extends:
    - .remove_build_dir_cluster
  dependencies:
    - thought-build_pixi_env
  variables:
    REMOTE_ADDRESS: $LNM_REMOTE_ADDRESS
  needs:
    - job: thought-build_pixi_env
    - job: lnm-cluster_tests
      optional: true
      artifacts: false
  tags:
    - lnm-build
  rules:
    - if: $LNM_TESTS == "1"

charon-cluster-remove_build_dir:
  extends:
    - .remove_build_dir_cluster
  dependencies:
    - charon-build_pixi_env
  variables:
    REMOTE_ADDRESS: $IMCS_REMOTE_ADDRESS
  needs:
    - job: charon-build_pixi_env
    - job: imcs-cluster_tests
      optional: true
      artifacts: false
  tags:
    - imcs-build
  rules:
    - if: $IMCS_TESTS == "1"
