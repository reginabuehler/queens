# Single-node SLURM config for the cluster_local integration test.
# Plugins are chosen to run cgroup-free so this works in an
# unprivileged container (SLURM 21.08 on ubuntu 22.04).

ClusterName=queens-ci
SlurmctldHost=HOSTNAME_PLACEHOLDER
SlurmUser=slurm

# cgroup-free plugins (the default proctrack/cgroup needs cgroup access we lack)
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none
# Schedule by individual CPUs, not whole nodes
SelectType=select/cons_tres
SelectTypeParameters=CR_CPU

# Let slurmd boot even if the runner's real CPU count differs from CPUs=4 below
SlurmdParameters=config_overrides
ReturnToService=2

AuthType=auth/munge

# Paths must match the dirs created in the Dockerfile
SlurmctldPidFile=/run/slurm/slurmctld.pid
SlurmdPidFile=/run/slurm/slurmd.pid
SlurmdSpoolDir=/var/spool/slurmd
StateSaveLocation=/var/lib/slurm
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

# Short timers so the node reaches IDLE quickly in CI (defaults are minutes)
SlurmctldTimeout=60
SlurmdTimeout=60
MinJobAge=2
KillWait=10

# The single compute node = this container (values need not match real hardware)
NodeName=HOSTNAME_PLACEHOLDER CPUs=4 RealMemory=1024 State=UNKNOWN
PartitionName=normal Nodes=ALL Default=YES MaxTime=INFINITE State=UP
